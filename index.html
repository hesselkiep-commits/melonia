<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Royal Kingdom of Melonia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <header class="hero" id="top">
      <nav class="topnav">
        <div class="wordmark">
          <span class="wordmark__eyebrow" data-i18n="brandingEyebrow"></span>
          <strong class="wordmark__title" id="siteNameTop"></strong>
        </div>

        <div class="topnav__controls">
          <a class="button button--ghost" href="dev.html" target="_blank" rel="noopener noreferrer" data-i18n="devPortalLink"></a>
          <div class="language-switcher" id="languageSwitcher" aria-label="Language selector"></div>
        </div>
      </nav>

      <div class="hero__content">
        <div class="hero__copy">
          <p class="hero__overline" data-i18n="heroOverline"></p>
          <h1 id="siteNameHero"></h1>
          <p class="hero__motto" id="siteMotto"></p>
          <p class="hero__intro" data-i18n="heroIntro"></p>
          <div class="hero__actions">
            <a class="button button--primary" href="#registers" data-i18n="heroPrimaryAction"></a>
            <a class="button" href="#news" data-i18n="heroSecondaryAction"></a>
          </div>
        </div>

        <aside class="hero-card">
          <div class="hero-flag">
            <img src="melonia.png" alt="Flag of Melonia" id="flagImage">
          </div>
          <dl class="hero-facts">
            <div>
              <dt data-i18n="factFounded"></dt>
              <dd id="siteFounded"></dd>
            </div>
            <div>
              <dt data-i18n="factCapital"></dt>
              <dd id="siteCapital"></dd>
            </div>
            <div>
              <dt data-i18n="factTerritories"></dt>
              <dd id="territoryCount"></dd>
            </div>
            <div>
              <dt data-i18n="factGovernment"></dt>
              <dd data-i18n="governmentShort"></dd>
            </div>
          </dl>
        </aside>
      </div>
    </header>

    <main class="main-content">
      <section class="section section--grid" id="about">
        <article class="panel panel--feature">
          <p class="section__eyebrow" data-i18n="sectionAboutEyebrow"></p>
          <h2 data-i18n="sectionAboutTitle"></h2>
          <p data-i18n="sectionAboutBody"></p>
        </article>

        <article class="panel">
          <p class="section__eyebrow" data-i18n="sectionMissionEyebrow"></p>
          <h2 data-i18n="sectionMissionTitle"></h2>
          <p data-i18n="sectionMissionBody"></p>
        </article>
      </section>

      <section class="section" id="news">
        <div class="section-heading">
          <p class="section__eyebrow" data-i18n="sectionNewsEyebrow"></p>
          <h2 data-i18n="sectionNewsTitle"></h2>
          <p data-i18n="sectionNewsLead"></p>
        </div>
        <div class="cards cards--three" id="newsGrid"></div>
      </section>

      <section class="section" id="government">
        <div class="section-heading">
          <p class="section__eyebrow" data-i18n="sectionGovernmentEyebrow"></p>
          <h2 data-i18n="sectionGovernmentTitle"></h2>
          <p data-i18n="sectionGovernmentLead"></p>
        </div>

        <div class="government-layout">
          <article class="panel">
            <h3 data-i18n="sectionMonarchyTitle"></h3>
            <p data-i18n="sectionMonarchyBody"></p>
          </article>

          <article class="panel">
            <h3 data-i18n="sectionCouncilTitle"></h3>
            <p data-i18n="sectionCouncilBody"></p>
          </article>

          <article class="panel panel--wide">
            <h3 data-i18n="sectionMinistriesTitle"></h3>
            <div class="ministry-grid" id="ministryGrid"></div>
          </article>
        </div>
      </section>

      <section class="section" id="territories">
        <div class="section-heading">
          <p class="section__eyebrow" data-i18n="sectionTerritoriesEyebrow"></p>
          <h2 data-i18n="sectionTerritoriesTitle"></h2>
          <p data-i18n="sectionTerritoriesLead"></p>
        </div>
        <div class="cards cards--three" id="territoryGrid"></div>
      </section>

      <section class="section" id="allies">
        <div class="section-heading">
          <p class="section__eyebrow" data-i18n="sectionAlliesEyebrow"></p>
          <h2 data-i18n="sectionAlliesTitle"></h2>
          <p data-i18n="sectionAlliesLead"></p>
        </div>
        <div class="cards cards--three" id="alliesGrid"></div>
      </section>

      <section class="section" id="registers">
        <div class="section-heading">
          <p class="section__eyebrow" data-i18n="sectionRegistersEyebrow"></p>
          <h2 data-i18n="sectionRegistersTitle"></h2>
          <p data-i18n="sectionRegistersLead"></p>
        </div>

        <div class="register-layout">
          <article class="panel">
            <h3 data-i18n="citizenFormTitle"></h3>
            <p class="panel__lead" data-i18n="citizenFormLead"></p>
            <form class="official-form" id="citizenForm">
              <label>
                <span data-i18n="labelFullName"></span>
                <input type="text" name="fullName" required>
              </label>
              <label>
                <span data-i18n="labelBirthDate"></span>
                <input type="date" name="birthDate" required>
              </label>
              <label>
                <span data-i18n="labelResidence"></span>
                <input type="text" name="residence" required>
              </label>
              <label>
                <span data-i18n="labelTerritory"></span>
                <select name="territory" id="citizenTerritory" required></select>
              </label>
              <label>
                <span data-i18n="labelNotes"></span>
                <textarea name="notes" rows="4"></textarea>
              </label>
              <button class="button button--primary" type="submit" data-i18n="submitCitizen"></button>
            </form>
            <p class="form-status" id="citizenStatus"></p>
          </article>

          <article class="panel">
            <h3 data-i18n="passportFormTitle"></h3>
            <p class="panel__lead" data-i18n="passportFormLead"></p>
            <form class="official-form" id="passportForm">
              <label>
                <span data-i18n="labelApplicantName"></span>
                <input type="text" name="applicantName" required>
              </label>
              <label>
                <span data-i18n="labelDocumentType"></span>
                <select name="documentType" required>
                  <option value="standard" data-i18n-option="documentStandard"></option>
                  <option value="official" data-i18n-option="documentOfficial"></option>
                  <option value="service" data-i18n-option="documentService"></option>
                </select>
              </label>
              <label>
                <span data-i18n="labelTerritory"></span>
                <select name="territory" id="passportTerritory" required></select>
              </label>
              <label>
                <span data-i18n="labelIssueReason"></span>
                <textarea name="issueReason" rows="4" required></textarea>
              </label>
              <button class="button button--primary" type="submit" data-i18n="submitPassport"></button>
            </form>
            <p class="form-status" id="passportStatus"></p>
          </article>
        </div>
      </section>

    </main>
  </div>

  <template id="recordTemplate">
    <article class="record-card">
      <strong class="record-card__title"></strong>
      <p class="record-card__meta"></p>
      <p class="record-card__body"></p>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
