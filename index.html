<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maintenance | The Empire of Melonia</title>

  <style>
    body {
      margin: 0;
      background: #07150d;
      color: #f4d86a;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      max-width: 700px;
      padding: 40px;
      border: 1px solid rgba(244,216,106,0.2);
      border-radius: 20px;
      background: rgba(0,0,0,0.35);
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      color: #d7d7d7;
      font-size: 18px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="box">
    <h1>Maintenance</h1>

    <p>
      The Imperial Public Portal of Melonia is currently undergoing maintenance.
    </p>

    <p>
      Please return later.
    </p>
  </div>

</body>
</html>
