<!DOCTYPE html>
<html>
<head>
  <title>Citizen Application</title>
</head>
<body>

  <h1>Citizen Application Form</h1>
  
  <form id="citizenForm">
    <input type="text" name="fullName" placeholder="Full Name" required><br><br>
    <input type="date" name="birthDate" required><br><br>
    <input type="text" name="residence" placeholder="Residence" required><br><br>
    <input type="text" name="territory" placeholder="Territory" required><br><br>
    <textarea name="notes" placeholder="Notes"></textarea><br><br>

    <button type="submit">Submit</button>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

  <script src="citizen.js"></script>

</body>
</html>
